<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Orange background -->
  <rect width="32" height="32" rx="6" fill="#f97316"/>
  <!-- White form card -->
  <rect x="5" y="4" width="16" height="20" rx="2.5" fill="white"/>
  <!-- Field lines -->
  <rect x="7.5" y="9" width="11" height="2" rx="1" fill="#111111" opacity="0.5"/>
  <rect x="7.5" y="13" width="11" height="2" rx="1" fill="#111111" opacity="0.35"/>
  <rect x="7.5" y="17" width="7" height="2" rx="1" fill="#111111" opacity="0.25"/>
  <!-- Pencil body -->
  <rect x="18" y="17" width="5" height="12" rx="1.5" fill="#111111" transform="rotate(-45 20 22)"/>
  <!-- Pencil tip -->
  <path d="M22 26 L18 28 L20 24Z" fill="#111111"/>
  <!-- Pencil eraser/top (orange accent) -->
  <rect x="18" y="17" width="5" height="3" rx="1" fill="#f97316" transform="rotate(-45 20 22)"/>
</svg>
